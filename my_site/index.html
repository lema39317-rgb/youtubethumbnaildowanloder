<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free YouTube Thumbnail Downloader - High Quality</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        h1 { margin-bottom: 10px; font-size: 24px; color: #ff0000; }
        p { color: #666; margin-bottom: 20px; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 15px; outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: #ff0000; }
        button { background-color: #ff0000; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.3s; }
        button:hover { background-color: #cc0000; }
        .result-box { margin-top: 25px; display: none; }
        .thumbnail-preview { width: 100%; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .download-btn { background-color: #28a745; text-decoration: none; display: inline-block; }
        .download-btn:hover { background-color: #218838; }
        .ad-space { width: 100%; background: #eee; padding: 15px; margin: 20px 0; border: 1px dashed #bbb; border-radius: 8px; font-size: 12px; color: #888; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>YouTube Thumbnail Downloader</h1>
        <p>Paste a YouTube video link below to download its thumbnail image instantly in Full HD.</p>
        
        <input type="text" id="videoUrl" placeholder="https://youtube.com..." required>
        <button onclick="getThumbnail()">Get Thumbnail</button>

        <!-- Place your ad code inside this box later -->
        <div class="ad-space" id="adTop">✦ Advertisement Banner Space ✦</div> 
		<meta name="monetag" content="ac3097fedc517d3c57a4bb9b1756ef6c">

        <div class="result-box" id="resultBox">
            <h3>Your Thumbnail is Ready!</h3>
            <p>Right-click the image and save, or click the download button below.</p>
            <img id="thumbImg" class="thumbnail-preview" src="" alt="YouTube Thumbnail Preview">
            <a id="downloadLink" class="download-btn" href="" download="thumbnail.jpg"><button style="background-color: #28a745;">Download Full HD Image</button></a>
        </div>
    </div>

    <script>
        function getThumbnail() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const resultBox = document.getElementById('resultBox');
            const thumbImg = document.getElementById('thumbImg');
            const downloadLink = document.getElementById('downloadLink');
            
            let videoId = '';

            // Extract video ID using regex from standard, short, or mobile YouTube URLs
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = urlInput.match(regExp);

            if (match && match[2].length === 11) {
                videoId = match[2];
                // Max Resolution (Full HD) URL from Google servers
                const maxResUrl = `https://youtube.com{videoId}/maxresdefault.jpg`;
                
                thumbImg.src = maxResUrl;
                downloadLink.href = maxResUrl;
                resultBox.style.display = 'block';
            } else {
                alert('Please enter a valid YouTube video link!');
                resultBox.style.display = 'none';
            }
        }
    </script>
</body>
</html>
